<body>

    <h1>Formulários</h1>
    <p>Como adicionar Inputs no HTML</p>
    
    <form>

        <p>Digite o seu nome:</p>
        <input required minlength="3" />
    
        <p>Digite sua senha:</p>
        <input type="password" required >
    
        <br/>
        <br/>
        
        <button>Salvar</button>
        
    </form>
